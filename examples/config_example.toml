guidestar_mag_max = 22.0
guidestar_neighbor_mag_min = 21.0
guidestar_minsep_deg = 0.0002778
n_fluxstd = 200
fluxstd_mag_max = 19.0
fluxstd_mag_min = 17.0
fluxstd_mag_filter = "g"
