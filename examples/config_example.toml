[ppp]
mode = "classic"
localPath_tgt = ""
localPath_ppc = ""
visibility_check = false
daily_plan = true
proposalIds = ["S26A-126"]

[qplan]
overhead = "5"
obs_dates = ["2026-05-06", "2026-05-07"]
