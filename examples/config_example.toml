fluxstd_min_prob_f_star = 0.5
fluxstd_min_teff = 5000
fluxstd_max_teff = 8000
filler = true
filler_mag_min = 17.0
filler_mag_max = 99.0
n_fillers_random = 30000
fill_unassign_radius_check = 0.00083
fill_unassign = true
fill_unassign_radius = 0.00694
fill_unassign_gaia_mag = 18.0
fill_unassign_pslId = "S25A-000QF"

[ope]
runName = "test"
