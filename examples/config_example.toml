[ppp]
mode = 'queue'
localPath_tgt = '' 
localPath_ppc = ''
sql_query = ""
inputDir = 'input'
reserveFibers = false
fiberNonAllocationCost = 0.0
visibility_check=false
daily_plan=true

[qplan]
overhead = "5" # minute
obs_dates = [
    "2026-03-13",
    "2026-03-14",
    "2026-03-21",
    "2026-03-22",
]
start_time = [
    "2026-03-14 00:30:00",
    "2026-03-15 00:30:00",
    "2026-03-22 00:30:00",
    "2026-03-23 00:30:00",
]  # HST

stop_time = [
    "2026-03-14 05:45:00",
    "2026-03-15 05:45:00",
    "2026-03-22 05:40:00",
    "2026-03-23 05:40:00",
]  # HST

[qplan.weight]
